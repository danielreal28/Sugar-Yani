name: Build Sugar Yani APK

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Set up NodeJS 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Inicializar y Crear package.json
        run: |
          npm init -y

      - name: Instalar Dependencias de Capacitor
        run: |
          npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Inicializar Proyecto Nativo de Azúcar
        run: |
          npx cap init "Sugar Yani" "com.danielreal.sugaryani" --web-dir=www
          npx cap add android

      - name: Sincronizar Recursos Web
        run: npx cap sync android

      - name: Otorgar Permisos al Ejecutable de Gradle
        run: |
          cd android
          chmod +x gradlew

      - name: Compilar APK en Modo Debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Subir APK Terminado a GitHub
        uses: actions/upload-artifact@v4
        with:
          name: SugarYani-DanielReal
          path: android/app/build/outputs/apk/debug/app-debug.apk
